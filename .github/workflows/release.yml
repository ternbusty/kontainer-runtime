name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # Gate release-please on CI + integration. Both workflows are reused via
  # workflow_call so a broken main never produces a release / binary upload.
  ci:
    uses: ./.github/workflows/ci.yml
  integration:
    uses: ./.github/workflows/integration.yml

  release-please:
    needs: [ci, integration]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
      version: ${{ steps.release-please.outputs.version }}
    steps:
      - name: Run release-please
        id: release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-linux-x86_64:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libseccomp-dev

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release binary
        run: ./gradlew linkReleaseExecutableLinuxX64

      - name: Stage binary with versioned name
        run: |
          mkdir -p dist
          # xdperf-style naming: <binary>_<version>_<os>_<arch>
          # tag_name is "vX.Y.Z"; version is "X.Y.Z" (no leading v)
          cp build/bin/linuxX64/releaseExecutable/kontainer-runtime.kexe \
             dist/kontainer-runtime_${{ needs.release-please.outputs.version }}_linux_amd64

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/*
