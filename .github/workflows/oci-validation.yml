name: OCI runtime-tools validation

# Builds kontainer-runtime, then runs the OCI runtime-spec validation suite
# (opencontainers/runtime-tools) against the resulting binary. Modelled on
# takoyaki's oci-validation workflow.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: runtime-tools validation
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Install Go and TAP tooling
        run: |
          # GitHub-hosted runners occasionally ship with broken Microsoft
          # third-party apt repos (403 on InRelease); a single failed source
          # shouldn't fail the whole workflow, so tolerate `apt-get update`.
          sudo apt-get update || true
          sudo apt-get install -y golang-go make perl libseccomp-dev

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build kontainer-runtime release binary
        run: |
          ./gradlew linkReleaseExecutableLinuxX64 --no-daemon
          sudo mkdir -p /opt/kontainer-runtime
          sudo cp build/bin/linuxX64/releaseExecutable/kontainer-runtime.kexe \
            /opt/kontainer-runtime/bin
          sudo chmod +x /opt/kontainer-runtime/bin

      - name: Clone and build runtime-tools validation suite
        run: |
          cd $HOME
          git clone --depth 1 https://github.com/opencontainers/runtime-tools
          cd runtime-tools
          make runtimetest validation-executables

      - name: Build busybox rootfs tarball
        run: |
          set -eux
          BUSYBOX=$(which busybox || true)
          if [ -z "$BUSYBOX" ]; then
            sudo apt-get install -y busybox-static
            BUSYBOX=$(which busybox)
          fi
          # runtime-tools' GetDefaultGenerator sets root.path=".", so the tarball
          # must extract directly into the bundle dir (NOT under a rootfs/ subdir),
          # otherwise /bin/sh ends up at <bundle>/rootfs/bin/sh and the container
          # process exec'd against root="." can't find it.
          STAGE=$(mktemp -d)
          mkdir -p $STAGE/{bin,etc,proc,sys,dev,tmp}
          cp "$BUSYBOX" $STAGE/bin/
          ( cd $STAGE/bin && for c in sh ls cat echo grep awk sleep true false test mkdir rm chmod chown touch stat date wc head tail sort uniq id ps mount umount; do ln -sf busybox $c; done )
          ARCH=$(uname -m)
          case "$ARCH" in
            aarch64|arm64) GOARCH=arm64 ;;
            x86_64|amd64)  GOARCH=amd64 ;;
            *)             GOARCH=$ARCH ;;
          esac
          tar -czf $HOME/runtime-tools/rootfs-$GOARCH.tar.gz -C $STAGE .

      - name: Run validation suite
        id: run-validation
        run: |
          set +e
          cd $HOME/runtime-tools
          RUNTIME=/opt/kontainer-runtime/bin
          mkdir -p $HOME/validation-out
          PASS=0; FAIL=0; ERROR=0; TIMEOUT=0; SKIP_V1=0; SKIP_BROKEN=0
          declare -a FAIL_NAMES TIMEOUT_NAMES SKIP_V1_NAMES SKIP_BROKEN_NAMES
          # Cgroup v1 tests are skipped on cgroup-v2 only hosts because they probe
          # v1 hierarchies (net_cls, blkio, hugetlb) that the kernel does not
          # expose. Ubuntu 22.04+ is cgroup-v2 only.
          SKIP_V1_PATTERN='^(linux_cgroups_(network|blkio|hugetlb|devices|pids|relative_(blkio|network|hugetlb|devices|pids))|linux_cgroups_relative_cpus|linux_cgroups_relative_memory|linux_cgroups_cpus|linux_cgroups_memory|delete_(only_create_)?resources)$'
          # Known-broken tests we deliberately skip until the underlying gap is
          # addressed. Each entry has a comment explaining why.
          #   pidfile  -- runtime-tools issue #805: PreDelete sends Kill to a
          #               container whose process (`true`) has already exited.
          #               The OCI spec REQUIRES Kill on a stopped container to
          #               error, so every spec-compliant runtime fails it.
          #   linux_ns_path -- requires setns() into mount/pid namespaces by
          #               path. mount-ns setns is rejected by the kernel on a
          #               multi-threaded process (Kotlin/Native ships with GC
          #               threads); pid-ns setns must happen before the bootstrap
          #               clone of stage-2. Both need bootstrap.c-level rework.
          #   process_rlimits -- Go's runtime auto-raises RLIMIT_NOFILE soft to
          #               hard during /runtimetest startup, masking the value we
          #               set (3000); only NOFILE is affected. Not a runtime bug.
          #               (takoyaki has the same behaviour: rc=0 / empty TAP.)
          SKIP_BROKEN_PATTERN='^(pidfile|process_rlimits)$'
          for t in validation/*/*.t; do
            name=$(basename "$t" .t)
            if echo "$name" | grep -qE "$SKIP_V1_PATTERN"; then
              SKIP_V1=$((SKIP_V1+1))
              SKIP_V1_NAMES+=("$name")
              echo "SKIP(v1) $name"
              continue
            fi
            if echo "$name" | grep -qE "$SKIP_BROKEN_PATTERN"; then
              SKIP_BROKEN=$((SKIP_BROKEN+1))
              SKIP_BROKEN_NAMES+=("$name")
              echo "SKIP(broken-upstream) $name"
              continue
            fi
            out=$HOME/validation-out/$name.log
            sudo timeout 60 env RUNTIME=$RUNTIME "$t" > "$out" 2>&1
            rc=$?
            sudo $RUNTIME delete --force "$name" 2>/dev/null || true
            sudo rm -rf /run/kontainer/* /tmp/kontainer-*.sock 2>/dev/null || true
            if [ "$rc" -eq 124 ]; then
              TIMEOUT=$((TIMEOUT+1))
              TIMEOUT_NAMES+=("$name")
              echo "TIMEOUT  $name"
              continue
            fi
            n_ok=$(grep -c "^ok " "$out" 2>/dev/null)
            n_notok=$(grep -c "^not ok " "$out" 2>/dev/null)
            n_ok=${n_ok:-0}; n_notok=${n_notok:-0}
            if [ "$n_notok" -gt 0 ]; then
              FAIL=$((FAIL+1))
              FAIL_NAMES+=("$name (ok=$n_ok notok=$n_notok)")
              echo "FAIL     $name  ok=$n_ok notok=$n_notok"
            elif [ "$n_ok" -gt 0 ]; then
              PASS=$((PASS+1))
              echo "PASS     $name  ok=$n_ok"
            elif [ "$rc" -ne 0 ]; then
              ERROR=$((ERROR+1))
              echo "ERROR    $name  rc=$rc"
            else
              echo "SKIP     $name"
            fi
          done
          echo "=== SUMMARY ==="
          echo "PASS=$PASS  FAIL=$FAIL  TIMEOUT=$TIMEOUT  ERROR=$ERROR  SKIP_V1=$SKIP_V1  SKIP_BROKEN=$SKIP_BROKEN"
          {
            echo "## OCI runtime-tools validation"
            echo
            echo "| metric | count |"
            echo "|---|---|"
            echo "| pass | $PASS |"
            echo "| fail | $FAIL |"
            echo "| timeout | $TIMEOUT |"
            echo "| error | $ERROR |"
            echo "| skip (cgroup v1) | $SKIP_V1 |"
            echo "| skip (broken upstream) | $SKIP_BROKEN |"
            echo
            if [ ${#FAIL_NAMES[@]} -gt 0 ]; then
              echo "### Failing tests"
              for n in "${FAIL_NAMES[@]}"; do
                echo "- $n"
              done
            fi
            if [ ${#TIMEOUT_NAMES[@]} -gt 0 ]; then
              echo "### Timeouts"
              for n in "${TIMEOUT_NAMES[@]}"; do
                echo "- $n"
              done
            fi
            if [ ${#SKIP_BROKEN_NAMES[@]} -gt 0 ]; then
              echo "### Skipped (known-broken upstream tests)"
              for n in "${SKIP_BROKEN_NAMES[@]}"; do
                echo "- $n"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          # Gate the workflow on any failing/erroring test. Tests we deliberately
          # don't implement (or that fail upstream regardless of runtime) are in
          # SKIP_BROKEN_PATTERN above with a per-entry justification.
          if [ "$FAIL" -gt 0 ] || [ "$TIMEOUT" -gt 0 ] || [ "$ERROR" -gt 0 ]; then
            echo "::error::validation failed: FAIL=$FAIL TIMEOUT=$TIMEOUT ERROR=$ERROR"
            exit 1
          fi

      - name: Upload per-test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validation-logs
          path: ~/validation-out/
